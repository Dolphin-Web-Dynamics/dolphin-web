# =============================================================================
# nginx-ghost.conf — Nginx reverse proxy for Ghost CMS
# Location: /etc/nginx/sites-available/ghost
# Symlink:  ln -s /etc/nginx/sites-available/ghost /etc/nginx/sites-enabled/ghost
#
# SSL certificates managed by Certbot:
#   certbot --nginx -d newsletter.dolphinwebdynamics.com
# =============================================================================

# Redirect all HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name newsletter.dolphinwebdynamics.com;

    # ACME challenge for Certbot renewal
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type "text/plain";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — Ghost reverse proxy
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name newsletter.dolphinwebdynamics.com;

    # ---------------------------------------------------------------------------
    # SSL — managed by Certbot (do not edit these lines manually)
    # ---------------------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/newsletter.dolphinwebdynamics.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/newsletter.dolphinwebdynamics.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ---------------------------------------------------------------------------
    # Security headers
    # ---------------------------------------------------------------------------
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "SAMEORIGIN"                                    always;
    add_header X-Content-Type-Options     "nosniff"                                       always;
    add_header X-XSS-Protection           "1; mode=block"                                 always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"               always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"      always;

    # ---------------------------------------------------------------------------
    # Logging
    # ---------------------------------------------------------------------------
    access_log /var/log/nginx/ghost-access.log;
    error_log  /var/log/nginx/ghost-error.log;

    # ---------------------------------------------------------------------------
    # Client settings
    # ---------------------------------------------------------------------------
    client_max_body_size 50m;
    client_body_buffer_size 128k;

    # ---------------------------------------------------------------------------
    # Proxy to Ghost (localhost:2368)
    # ---------------------------------------------------------------------------
    location / {
        proxy_pass             http://127.0.0.1:2368;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_buffering    off;
        proxy_read_timeout 90s;
        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;

        # Cache static assets
        proxy_cache_bypass $http_upgrade;
    }

    # ---------------------------------------------------------------------------
    # Ghost Admin — restrict if needed (uncomment to whitelist IPs)
    # ---------------------------------------------------------------------------
    location /ghost/ {
        proxy_pass             http://127.0.0.1:2368/ghost/;
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_buffering    off;

        # Optional: whitelist admin access by IP
        # allow YOUR.HOME.IP.ADDRESS;
        # deny all;
    }

    # ---------------------------------------------------------------------------
    # Gzip compression
    # ---------------------------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # ---------------------------------------------------------------------------
    # Cache static files
    # ---------------------------------------------------------------------------
    location ~* \.(jpg|jpeg|gif|png|webp|svg|ico|woff|woff2|ttf|otf|eot|css|js)$ {
        proxy_pass http://127.0.0.1:2368;
        proxy_set_header Host            $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
